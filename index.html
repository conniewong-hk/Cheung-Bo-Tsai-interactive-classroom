<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>張保仔互動教室 | 人文教育教材</title>
    <!-- 使用 CDN 加載所需的庫 -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body { 
            margin: 0; 
            background-color: #fffbeb; /* amber-50 */
            font-family: "Microsoft JhengHei", "微軟正黑體", sans-serif;
            min-height: 100vh;
        }
        .chat-bubble::after {
            content: '';
            position: absolute;
            bottom: -10px;
            left: 50%;
            transform: translateX(-50%);
            border-width: 10px 10px 0 10px;
            border-style: solid;
            border-color: rgba(255, 255, 255, 0.95) transparent transparent transparent;
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        const App = () => {
            const [isGenerating, setIsGenerating] = useState(false);
            const [message, setMessage] = useState("點擊下面按鈕或直接發問，聽聽我張保仔嘅故事啦！");
            const [userInput, setUserInput] = useState("");
            
            // 在 HTML 版本中，請直接在此處填入 API Key
            // 注意：上傳到 GitHub Pages 後，此 Key 對外可見。
            const apiKey = ""; 

            const historyLessons = {
                whyPirate: "唉，當年我十幾歲出海搵食，生活好艱難。清朝末年社會動盪，唔做海盜就無飯食，我係為咗生存先至帶領部下喺海上闖蕩。",
                cave: "你哋去過長洲個洞未？嗰度好窄，係我平時用嚟收埋寶物同埋『走鬼』避開官兵嘅地方。雖然依家入面空空如也，但當年係好重要嘅據點！",
                villagers: "當時好多村民見到紅旗幫（我嘅船隊）都會好驚。其實海盜生活反映咗當時社會贫富懸殊同官員腐敗，人民被迫走上絕路。",
                safety: "雖然我係海盜，但我後來明白到海上貿易同領海安全對國家好重要。所以我最終接受咗招安，成為清朝水師將領，協助維持海上秩序。"
            };

            const handleAskQuestion = async () => {
                if (!userInput.trim() || isGenerating) return;
                if (!apiKey) {
                    setMessage("⚠️ 尚未設定 API Key，請在代碼中填入以啟用 AI 功能。");
                    return;
                }
                setIsGenerating(true);
                const q = userInput;
                setUserInput("");
                setMessage("等我諗下點樣答你... 帆船都要時間轉彎架嘛！");

                try {
                    const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            systemInstruction: {
                                parts: [{ text: "你現在扮演清朝大海盜張保仔，對象是小學四年級學生。語氣豪爽、自信但友善。使用繁體中文並夾雜少量地道廣東話。內容必須符合歷史事實：艱苦生存、張保仔洞、村民恐懼、領海安全。不超過80字。" }]
                            },
                            contents: [{ parts: [{ text: q }] }]
                        })
                    });
                    const result = await response.json();
                    const answer = result.candidates?.[0]?.content?.parts?.[0]?.text || "哎呀，訊號唔好，再問一次啦！";
                    setMessage(answer);
                    setIsGenerating(false);
                } catch (e) {
                    setMessage("哎呀，壞咗船！請檢查你嘅網絡或 API 設定。");
                    setIsGenerating(false);
                }
            };

            // 初始化 Lucide 圖標
            useEffect(() => {
                lucide.createIcons();
            }, [message, isGenerating]);

            return (
                <div className="min-h-screen flex items-center justify-center p-4">
                    <div className="w-full max-w-2xl bg-white rounded-3xl shadow-2xl border-4 border-amber-700 overflow-hidden flex flex-col">
                        
                        {/* Header */}
                        <div className="bg-amber-700 p-6 text-white text-center flex-shrink-0">
                            <h1 className="text-2xl sm:text-3xl font-bold flex items-center justify-center gap-3">
                                <i data-lucide="anchor" className="w-8 h-8"></i> 張保仔互動教室
                            </h1>
                        </div>

                        {/* Avatar & Message Area */}
                        <div className="relative bg-gradient-to-b from-blue-100 to-blue-200 flex flex-col items-center py-10 px-4 sm:py-16">
                            <div className="text-8xl sm:text-9xl mb-8 drop-shadow-xl transition-transform hover:scale-110">🏴‍☠️</div>
                            <div className="chat-bubble relative bg-white/95 backdrop-blur-sm p-5 sm:p-6 rounded-2xl border-2 border-amber-300 shadow-lg w-full">
                                <p className="text-sm sm:text-base font-bold text-amber-900 leading-relaxed text-center italic">
                                    "{message}"
                                </p>
                            </div>
                        </div>

                        {/* Interaction Section */}
                        <div className="p-4 sm:p-8 bg-white">
                            <p className="text-[10px] text-amber-800 font-black mb-4 uppercase tracking-[0.2em] text-center">探索歷史主題</p>
                            
                            <div className="grid grid-cols-2 gap-3 mb-8">
                                <button onClick={() => setMessage(historyLessons.whyPirate)} className="flex flex-col items-center p-3 bg-amber-50 rounded-2xl hover:bg-amber-100 border-2 border-amber-100 transition-all active:scale-95 group">
                                    <i data-lucide="history" className="text-amber-700 mb-2 group-hover:rotate-[-10deg]"></i>
                                    <span className="text-xs font-black text-amber-900">做海盜原因</span>
                                </button>
                                <button onClick={() => setMessage(historyLessons.cave)} className="flex flex-col items-center p-3 bg-amber-50 rounded-2xl hover:bg-amber-100 border-2 border-amber-100 transition-all active:scale-95 group">
                                    <i data-lucide="skull" className="text-amber-700 mb-2 group-hover:animate-bounce"></i>
                                    <span className="text-xs font-black text-amber-900">神秘藏寶洞</span>
                                </button>
                                <button onClick={() => setMessage(historyLessons.villagers)} className="flex flex-col items-center p-3 bg-red-50 rounded-2xl hover:bg-red-100 border-2 border-red-100 transition-all active:scale-95 group">
                                    <i data-lucide="ship" className="text-red-700 mb-2 group-hover:translate-x-1"></i>
                                    <span className="text-xs font-black text-red-900">對村民影響</span>
                                </button>
                                <button onClick={() => setMessage(historyLessons.safety)} className="flex flex-col items-center p-3 bg-blue-50 rounded-2xl hover:bg-blue-100 border-2 border-blue-100 transition-all active:scale-95 group">
                                    <i data-lucide="anchor" className="text-blue-700 mb-2 group-hover:rotate-12"></i>
                                    <span className="text-xs font-black text-blue-900">海上秩序</span>
                                </button>
                            </div>

                            <div className="flex items-center gap-2 bg-stone-100 p-2 rounded-full border-2 border-amber-200 focus-within:border-amber-700 transition-all shadow-inner relative">
                                <i data-lucide="message-circle" className="ml-3 text-stone-400 w-5 h-5"></i>
                                <input 
                                    type="text" 
                                    value={userInput}
                                    onChange={(e) => setUserInput(e.target.value)}
                                    onKeyPress={(e) => e.key === 'Enter' && handleAskQuestion()}
                                    placeholder="問下我歷史問題..."
                                    className="bg-transparent flex-1 outline-none text-sm px-2 font-medium"
                                />
                                <button 
                                    onClick={handleAskQuestion}
                                    disabled={isGenerating || !userInput.trim()}
                                    className="bg-amber-700 text-white p-3 rounded-full hover:bg-amber-800 disabled:bg-stone-300 transition-all shadow-md active:scale-90 flex-shrink-0"
                                >
                                    {isGenerating ? <i data-lucide="loader-2" className="animate-spin w-5 h-5"></i> : <i data-lucide="send" className="w-5 h-5"></i>}
                                </button>
                            </div>

                            {!apiKey && (
                                <p className="mt-4 text-[10px] text-red-500 text-center font-bold animate-pulse">
                                    ⚠️ 偵測唔到 API Key。請在代碼中填入金鑰以啟用 AI 功能。
                                </p>
                            )}
                        </div>
                        
                        <div className="bg-stone-50 py-3 text-center border-t border-stone-200">
                            <p className="text-[10px] text-stone-400 font-bold uppercase tracking-[0.3em]">張保仔 人文教育教材 • GitHub 版</p>
                        </div>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
